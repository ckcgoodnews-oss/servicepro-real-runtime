services:
  postgres:
    image: postgres:16-alpine
    container_name: servicepro-postgres
    environment:
      POSTGRES_DB: servicepro
      POSTGRES_USER: servicepro
      POSTGRES_PASSWORD: servicepro
    ports:
      - "5432:5432"
    volumes:
      - servicepro_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicepro -d servicepro"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: servicepro-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: ServicePro
      APP_VERSION: 0.71.0
      DEFAULT_TENANT_ID: tenant_demo
      DATA_STORE: postgres
      DATABASE_URL: postgresql://servicepro:servicepro@postgres:5432/servicepro
      DATABASE_SSL: "false"
      JWT_SECRET: replace-this-with-a-long-random-secret
      PORTAL_TOKEN_SECRET: replace-this-with-a-long-random-portal-secret
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      MAX_JSON_BODY_BYTES: 1048576
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 120
      AUTH_RATE_LIMIT_MAX_REQUESTS: 12
    ports:
      - "3000:3000"

volumes:
  servicepro_pgdata:
