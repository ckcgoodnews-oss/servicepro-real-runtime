name: Online alpha smoke

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: Public HTTPS website origin
        required: true
        default: https://servicepro-web-alpha-ckcgoodnews.onrender.com
        type: string
      api_url:
        description: Public HTTPS API origin
        required: true
        default: https://servicepro-api-alpha-ckcgoodnews.onrender.com
        type: string
      authenticated:
        description: Include login, dashboard, and logout checks
        required: true
        default: false
        type: boolean
      tenant_id:
        description: Company tenant key sent to the API
        required: true
        default: tenant_demo
        type: string
      expected_store:
        description: Required deployed datastore
        required: true
        default: json
        type: choice
        options:
          - json
          - postgres

jobs:
  smoke:
    name: Verify deployed application
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Run online smoke checks
        run: node scripts/smoke-deployed-app.js

      - name: Upload deployment certification
        if: always() && hashFiles('reports/online-smoke/deployment-certification.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: deployment-certification-${{ github.run_id }}
          path: reports/online-smoke/deployment-certification.json
          if-no-files-found: error
          retention-days: 30
        env:
          SMOKE_WEB_URL: ${{ inputs.web_url }}
          SMOKE_API_URL: ${{ inputs.api_url }}
          SMOKE_REQUIRE_AUTH: ${{ inputs.authenticated }}
          SMOKE_EMAIL: ${{ secrets.ONLINE_SMOKE_EMAIL }}
          SMOKE_PASSWORD: ${{ secrets.ONLINE_SMOKE_PASSWORD }}
          SMOKE_TENANT_ID: ${{ inputs.tenant_id }}
          SMOKE_EXPECTED_STORE: ${{ inputs.expected_store }}
          SMOKE_TIMEOUT_MS: 90000
          SMOKE_EXPECTED_VERSION: 8.0.0-alpha.1
          SMOKE_REPORT_PATH: reports/online-smoke/deployment-certification.json
