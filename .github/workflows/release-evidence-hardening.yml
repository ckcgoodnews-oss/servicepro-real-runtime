name: Release Evidence Hardening

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/sprint-749-release-evidence-hardening'

permissions:
  contents: read

jobs:
  harden:
    name: Certify and harden release evidence
    runs-on: ubuntu-latest
    timeout-minutes: 35

    env:
      CI: 'true'
      NODE_ENV: production
      ALLOW_LOCAL_PRODUCTION_BUILD: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production certification
        run: npm run release:certify

      - name: Harden release evidence
        run: npm run release:evidence:harden

      - name: Upload hardened evidence
        uses: actions/upload-artifact@v4
        with:
          name: hardened-release-evidence-${{ github.sha }}
          if-no-files-found: error
          retention-days: 180
          path: |
            reports/release/
            reports/build/release-manifest.json
