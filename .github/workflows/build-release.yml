name: Production Build Certification
on:
  pull_request:
    branches: [main]
  push:
    branches: [main, codex/sprint-716-frontend-foundation]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm ci --prefix apps/web
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://servicepro-api-alpha-ckcgoodnews.onrender.com
      - run: npm run build:render:verify
      - uses: actions/upload-artifact@v4
        with:
          name: production-build-manifest
          path: reports/build/release-manifest.json
          retention-days: 30
