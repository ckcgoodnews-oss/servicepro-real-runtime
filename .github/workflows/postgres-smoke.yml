name: PostgreSQL Smoke

on:
  push:
    branches:
      - codex/sprint-716-frontend-foundation
  pull_request:
    branches:
      - main
      - develop

jobs:
  postgres-smoke:
    name: PostgreSQL migration and login smoke
    runs-on: ubuntu-latest
    env:
      DATA_STORE: postgres
      DATABASE_URL: postgresql://servicepro:servicepro@localhost:5432/servicepro
      DATABASE_SSL: "false"
      DEFAULT_TENANT_ID: tenant_demo
      OWNER_EMAIL: owner@example.com
      OWNER_PASSWORD: ChangeMe123!
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
      PORTAL_TOKEN_SECRET: ci-portal-secret-ci-portal-secret-ci-portal

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: servicepro
          POSTGRES_USER: servicepro
          POSTGRES_PASSWORD: servicepro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U servicepro -d servicepro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate migration manifest
        run: npm run migrations:check

      - name: Run migrations
        run: npm run migrate

      - name: Seed owner
        run: npm run seed:auth

      - name: Seed services
        run: npm run seed:services

      - name: Verify PostgreSQL API readiness and login
        run: npm run deploy:smoke:postgres
