name: PostgreSQL Smoke

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  postgres-smoke:
    name: PostgreSQL migration smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: servicepro
          POSTGRES_USER: servicepro
          POSTGRES_PASSWORD: servicepro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U servicepro -d servicepro"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: npm run migrate
        env:
          DATA_STORE: postgres
          DATABASE_URL: postgresql://servicepro:servicepro@localhost:5432/servicepro
          DATABASE_SSL: "false"
          JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
          PORTAL_TOKEN_SECRET: ci-portal-secret-ci-portal-secret-ci-portal

      - name: Seed services
        run: npm run seed:services
        env:
          DATA_STORE: postgres
          DATABASE_URL: postgresql://servicepro:servicepro@localhost:5432/servicepro
          DATABASE_SSL: "false"
          JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
          PORTAL_TOKEN_SECRET: ci-portal-secret-ci-portal-secret-ci-portal
