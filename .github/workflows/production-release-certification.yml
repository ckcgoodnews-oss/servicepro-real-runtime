name: Production Release Certification

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/sprint-748-production-release-certification'

permissions:
  contents: read

jobs:
  certify:
    name: Certify production release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: 'true'
      NODE_ENV: production
      ALLOW_LOCAL_PRODUCTION_BUILD: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify clean checkout
        run: |
          test -z "$(git status --porcelain --untracked-files=all)"

      - name: Run production release certification
        run: npm run release:certify

      - name: Upload certification evidence
        uses: actions/upload-artifact@v4
        with:
          name: production-release-certification-${{ github.sha }}
          if-no-files-found: error
          retention-days: 90
          path: |
            reports/release/
            reports/build/release-manifest.json
