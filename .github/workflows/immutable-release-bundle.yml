name: Immutable Release Bundle

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      authorization_reason:
        description: Deployment authorization reason
        required: true
        default: Release policy gate passed.
        type: string

permissions:
  contents: read

jobs:
  seal:
    name: Seal immutable release bundle
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment: ${{ inputs.target_environment }}

    env:
      CI: 'true'
      NODE_ENV: production
      ALLOW_LOCAL_PRODUCTION_BUILD: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      RELEASE_REQUIRE_CI: 'true'
      RELEASE_AUTH_REQUIRE_CI: 'true'
      RELEASE_REQUIRE_AUTHORIZATION_ACTOR: 'true'
      RELEASE_ALLOWED_BRANCHES: main,release/*,codex/sprint-*
      RELEASE_TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      RELEASE_AUTHORIZATION_ACTOR: ${{ github.actor }}
      RELEASE_AUTHORIZATION_REASON: ${{ inputs.authorization_reason }}

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build immutable release bundle
        run: npm run release:seal

      - name: Upload immutable release bundle
        uses: actions/upload-artifact@v4
        with:
          name: immutable-release-bundle-${{ inputs.target_environment }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 365
          path: |
            reports/release/immutable-bundle/
            reports/release/deployment-environment-inventory.json
            reports/release/immutable-release-bundle-manifest.json
            reports/release/immutable-release-bundle.md
