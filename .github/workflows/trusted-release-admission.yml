name: Trusted Release Admission

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: Deployment target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  admit:
    name: Register and admit trusted release
    runs-on: ubuntu-latest
    timeout-minutes: 70
    environment: ${{ inputs.target_environment }}

    env:
      CI: 'true'
      NODE_ENV: production
      ALLOW_LOCAL_PRODUCTION_BUILD: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      RELEASE_REQUIRE_CI: 'true'
      RELEASE_AUTH_REQUIRE_CI: 'true'
      RELEASE_REQUIRE_AUTHORIZATION_ACTOR: 'true'
      RELEASE_ALLOWED_BRANCHES: main,release/*,codex/sprint-*
      RELEASE_TARGET_ENVIRONMENT: ${{ inputs.target_environment }}
      RELEASE_AUTHORIZATION_ACTOR: ${{ github.actor }}
      RELEASE_AUTHORIZATION_REASON: GitHub protected environment admission.
      RELEASE_SIGNER_IDENTITY: ${{ github.actor }}
      RELEASE_SIGNING_PRIVATE_KEY: ${{ secrets.RELEASE_SIGNING_PRIVATE_KEY }}
      RELEASE_SIGNING_PUBLIC_KEY: ${{ vars.RELEASE_SIGNING_PUBLIC_KEY }}
      RELEASE_ADMISSION_ENVIRONMENTS: staging,production

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deployable trusted release
        run: npm run release:deployable

      - name: Upload admission evidence
        uses: actions/upload-artifact@v4
        with:
          name: deployment-admission-${{ inputs.target_environment }}-${{ github.sha }}
          if-no-files-found: error
          retention-days: 365
          path: |
            reports/release/trusted-release-registry/
            reports/release/deployment-admission-decision.json
            reports/release/deployment-admission-decision.md
            reports/release/release-signature-verification.json
            reports/release/release-signing-record.json
