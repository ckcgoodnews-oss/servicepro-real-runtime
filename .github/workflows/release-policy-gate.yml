name: Release Policy Gate

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'release/**'
      - 'codex/sprint-752-release-attestation-policy-gate'

permissions:
  contents: read

jobs:
  gate:
    name: Verify attestation and evaluate release policy
    runs-on: ubuntu-latest
    timeout-minutes: 50

    env:
      CI: 'true'
      NODE_ENV: production
      ALLOW_LOCAL_PRODUCTION_BUILD: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000
      RELEASE_REQUIRE_CI: 'true'
      RELEASE_ALLOWED_BRANCHES: main,release/*,codex/sprint-*

    steps:
      - name: Check out exact commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release policy gate
        run: npm run release:gate

      - name: Upload policy evidence
        uses: actions/upload-artifact@v4
        with:
          name: release-policy-gate-${{ github.sha }}
          if-no-files-found: error
          retention-days: 365
          path: |
            reports/release/
            reports/build/release-manifest.json
